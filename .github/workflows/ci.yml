name: Java CI and Docker

on:
  push:
    branches: [ main ]

jobs:
  # Job 1: Build and Test the Java code
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build with Maven
        run: mvn clean verify

  # Job 2: Build and Push Docker Image
  push-to-ghcr:
    needs: build-and-test # This connects the two boxes!
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Required to push to GitHub Packages

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # REPLACE <your-lowercase-username> BELOW!
          tags: |
            ghcr.io/houghtonweihu/my-java-cicd-learning:latest